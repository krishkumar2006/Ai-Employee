[options]
; =============================================================================
; Odoo 17 Community — Configuration
; Mounted at /etc/odoo/odoo.conf inside the container
; DB connection settings come from Docker environment variables (HOST, USER, PASSWORD)
; =============================================================================

; Master / admin password for the database manager
; IMPORTANT: change this to match ODOO_MASTER_PASSWORD in .env.docker
admin_passwd = CHANGE-THIS-MATCH-ENV-DOCKER

; Data directory (maps to the odoo_data Docker volume)
data_dir = /var/lib/odoo

; Addons paths
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons

; Log file (inside the data volume — persists between restarts)
logfile = /var/lib/odoo/odoo-server.log
log_level = info

; Workers for multi-process mode (Oracle ARM has 4 OCPUs — use 3 workers)
; Set workers=0 to use threaded mode (simpler, less RAM use)
workers = 3
max_cron_threads = 1

; Timeouts (seconds) — increase for slow reports
limit_time_cpu = 600
limit_time_real = 1200
limit_request = 8192

; Memory limits (bytes) — 24 GB RAM total, allocate generously
limit_memory_soft = 2147483648    ; 2 GB per worker
limit_memory_hard = 4294967296    ; 4 GB per worker

; Session token length
max_http_threads = 6

; Behind nginx reverse proxy
proxy_mode = True

; Disable demo data loading (production)
without_demo = all

; SMTP — configure after setup in Odoo Settings > Technical > Email
; smtp_server = smtp.gmail.com
; smtp_port = 587
; smtp_ssl = False
; smtp_user = your@gmail.com
; smtp_password = app-password
