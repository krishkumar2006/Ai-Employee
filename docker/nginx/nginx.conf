# =============================================================================
# nginx.conf — Odoo 17 reverse proxy with Let's Encrypt SSL
# Replace YOURDOMAIN.COM with your actual domain before starting
# =============================================================================

# Odoo HTTP (workers handle requests)
upstream odoo {
    server odoo:8069;
    keepalive 16;
}

# Odoo WebSocket / longpolling (workers=3, port 8072)
upstream odoo_chat {
    server odoo:8072;
}

# ---------------------------------------------------------------------------
# HTTP — port 80
# Only purpose: Let's Encrypt challenge + redirect to HTTPS
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name YOURDOMAIN.COM;

    # Let's Encrypt HTTP-01 challenge (certbot writes here)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # All other HTTP traffic → redirect HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — port 443
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name YOURDOMAIN.COM;

    # Let's Encrypt certificates
    ssl_certificate     /etc/letsencrypt/live/YOURDOMAIN.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOURDOMAIN.COM/privkey.pem;
    include /etc/nginx/options-ssl-nginx.conf;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"            always;
    add_header X-Content-Type-Options "nosniff"               always;
    add_header X-XSS-Protection       "1; mode=block"         always;
    add_header Referrer-Policy        "strict-origin"         always;

    # Max upload size for Odoo attachments (invoices, images, etc.)
    client_max_body_size 200m;

    # Proxy timeouts (Odoo reports can take a while)
    proxy_connect_timeout   720s;
    proxy_send_timeout      720s;
    proxy_read_timeout      720s;
    send_timeout            720s;

    # Common proxy headers
    proxy_set_header  Host              $host;
    proxy_set_header  X-Real-IP         $remote_addr;
    proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header  X-Forwarded-Proto $scheme;

    # ---------------------------------------------------------------------------
    # Odoo Web (main app)
    # ---------------------------------------------------------------------------
    location / {
        proxy_pass http://odoo;
        proxy_redirect off;
    }

    # ---------------------------------------------------------------------------
    # Odoo WebSocket (Odoo 16+ uses /websocket for real-time features)
    # ---------------------------------------------------------------------------
    location /websocket {
        proxy_pass http://odoo_chat;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
    }

    # ---------------------------------------------------------------------------
    # Odoo longpolling (legacy, workers mode)
    # ---------------------------------------------------------------------------
    location /longpolling {
        proxy_pass http://odoo_chat;
    }

    # ---------------------------------------------------------------------------
    # Static assets — aggressive browser caching (Odoo hashes filenames)
    # ---------------------------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://odoo;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        expires 7d;
    }

    # ---------------------------------------------------------------------------
    # Block direct access to Odoo database manager from internet
    # Comment this out if you need to create/drop databases remotely
    # ---------------------------------------------------------------------------
    location /web/database/ {
        # Allow only local access
        allow 127.0.0.1;
        deny all;
        proxy_pass http://odoo;
    }

    # Gzip compression
    gzip on;
    gzip_min_length 1000;
    gzip_proxied    expired no-cache no-store private must-revalidate auth;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript;
}
